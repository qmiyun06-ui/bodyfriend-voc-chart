<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바디프렌드 VOC 조사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e2e0da;
  --text: #1a1918;
  --text-sub: #6b6864;
  --text-hint: #a8a5a0;
  --accent: #1a1918;
  --accent-light: #f0ede8;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.nav-brand { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.nav-brand span { font-weight: 300; color: var(--text-sub); }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { padding: 6px 14px; border-radius: 999px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--text-sub); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.nav-tab.active { background: var(--accent); color: #fff; }

/* LAYOUT */
.page { display: none; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
.page.active { display: block; }

/* SURVEY SELECT */
.section-label { font-size: 11px; font-weight: 500; color: var(--text-hint); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px; }
.survey-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 2rem; }
.s-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.15s; }
.s-card:hover { border-color: #a8a5a0; }
.s-card.active { border: 2px solid var(--accent); background: var(--accent-light); }
.s-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 999px; display: inline-block; margin-bottom: 8px; }
.badge-c { background: #1d4ed8; color: #ffffff; }
.badge-s { background: #15803d; color: #ffffff; }
.s-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.s-desc { font-size: 11px; color: var(--text-sub); line-height: 1.4; }

/* FORM */
.form-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.form-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
.form-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.form-meta { font-size: 12px; color: var(--text-sub); }
.form-body { padding: 1.5rem; }
.sec-divider { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: var(--text-hint); text-transform: uppercase; padding: 1rem 0 0.75rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
.sec-divider:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.q-block { margin-bottom: 1.25rem; }
.q-text { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
.q-hint { font-size: 11px; color: var(--text-hint); margin-bottom: 8px; }

/* LIKERT */
.likert-wrap { display: flex; gap: 6px; }
.lk-btn { flex: 1; height: 36px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; color: var(--text-sub); cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.1s; }
.lk-btn:hover { border-color: #a8a5a0; color: var(--text); }
.lk-btn.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
.likert-ends { display: flex; justify-content: space-between; margin-top: 4px; }
.likert-end { font-size: 10px; color: var(--text-hint); }

/* RADIO / CHECK */
.opt-col { display: flex; flex-direction: column; gap: 8px; }
.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.opt-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
.opt-item input[type=radio], .opt-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

/* TEXT INPUT */
input[type=text] { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); outline: none; }
input[type=text]:focus { border-color: var(--accent); }
textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); resize: vertical; min-height: 72px; outline: none; }
textarea:focus { border-color: var(--accent); }

/* SUBMIT */
.submit-area { padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
.btn-submit { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
.btn-submit:hover { opacity: 0.85; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.submit-msg { text-align: center; padding: 1rem; font-size: 13px; }
.submit-ok { color: var(--green); font-weight: 500; }
.submit-err { color: #dc2626; }

/* DASHBOARD */
.dash-top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
.metric-label { font-size: 11px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
.metric-value { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; }
.metric-unit { font-size: 13px; color: var(--text-sub); margin-left: 3px; }
.dash-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.f-btn { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-sub); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 12px; }
.dash-card-title { font-size: 13px; font-weight: 700; margin-bottom: 1rem; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 11px; color: var(--text-sub); width: 90px; flex-shrink: 0; line-height: 1.4; }
.bar-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s ease; }
.bar-val { font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace; min-width: 28px; text-align: right; }
.count-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.count-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.count-name { font-size: 10px; color: var(--text-sub); margin-bottom: 4px; }
.count-num { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--text-hint); font-size: 13px; }
.loading { text-align: center; padding: 2rem; color: var(--text-hint); font-size: 13px; }
.refresh-btn { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-sub); cursor: pointer; font-family: inherit; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
</style>
</head>
<body>

<!-- 배너 영역 (이미지 삽입용 — 직접 교체하세요) -->
<div id="banner-area" style="width:100%;background:#e2e0da;min-height:80px;display:flex;align-items:center;justify-content:center;">
  <span style="font-size:12px;color:#a8a5a0;letter-spacing:0.4px">배너 이미지 영역 — 이미지 파일로 교체하세요</span>
</div>

<nav class="nav">
  <div class="nav-brand">바디프렌드 <span>VOC 조사</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('survey')">설문 수집</button>
    <button class="nav-tab" onclick="showPage('dashboard')">대시보드</button>
  </div>
</nav>

<!-- SURVEY PAGE -->
<div class="page active" id="page-survey">

    <div class="s-card active" onclick="selectSurvey('A')">

    </div>
    <div class="s-card" onclick="selectSurvey('C')">
      <span class="s-badge badge-c">고객</span>
      <div class="s-name">C. 배송 완료 고객</div>
      <div class="s-desc">배송·설치 고객</div>
    </div>
    <div class="s-card" onclick="selectSurvey('D')">
      <span class="s-badge badge-s">직원</span>
      <div class="s-name">D. 라운지 직원</div>
      <div class="s-desc">현장 운영 인터뷰</div>
    </div>
    <div class="s-card" onclick="selectSurvey('E')">
      <span class="s-badge badge-s">직원</span>
      <div class="s-name">E. 서비스 엔지니어</div>
      <div class="s-desc">AS 현장 인터뷰</div>
    </div>
    <div class="s-card" onclick="selectSurvey('F')">
      <span class="s-badge badge-s">직원</span>
      <div class="s-name">F. 배송 엔지니어</div>
      <div class="s-desc">배송 현장 인터뷰</div>
    </div>
  </div>
  <div id="form-container"></div>
</div>

<!-- DASHBOARD PAGE -->
<div class="page" id="page-dashboard">
  <div class="dash-header">
    <div class="section-label" style="margin:0">응답 현황</div>
    <button class="refresh-btn" onclick="loadDashboard()">새로고침</button>
  </div>
  <div class="dash-top">
    <div class="metric">
      <div class="metric-label">총 응답</div>
      <div class="metric-value" id="total-count">-<span class="metric-unit">건</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">평균 점수</div>
      <div class="metric-value" id="avg-score">-<span class="metric-unit">점</span></div>
    </div>
  </div>
  <div class="dash-card">
    <div class="dash-card-title">설문 유형별 응답 수</div>
    <div style="position:relative;width:100%;height:180px;">
      <canvas id="donutChart" role="img" aria-label="설문 유형별 응답 수 도넛 차트">설문 유형별 응답 분포</canvas>
    </div>
    <div id="donut-legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px"></div>
  </div>
  <div class="dash-filter">
    <button class="f-btn active" onclick="filterDash('A',this)">A 라운지</button>
    <button class="f-btn" onclick="filterDash('B',this)">B AS</button>
    <button class="f-btn" onclick="filterDash('C',this)">C 배송</button>
    <button class="f-btn" onclick="filterDash('D',this)">D 직원</button>
    <button class="f-btn" onclick="filterDash('E',this)">E 서비스</button>
    <button class="f-btn" onclick="filterDash('F',this)">F 배송엔지</button>
  </div>
  <div id="dash-detail"></div>
</div>

function showPage(p) {
  document.querySelectorAll('.page').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('page-' + p).classList.add('active');
  event.target.classList.add('active');
  if (p === 'dashboard') loadDashboard();
}

function selectSurvey(key) {
  currentSurvey = key;
  formData[key] = formData[key] || {};
  document.querySelectorAll('.s-card').forEach(function(c, i){
    c.classList.toggle('active', 'ABCDEF'[i] === key);
  });
  renderForm(key);
}

function renderForm(key) {
  var s = SURVEYS[key];
  var isStaff = ['D','E','F'].indexOf(key) !== -1;
  var isCustomer = ['A','B','C'].indexOf(key) !== -1;

  var noticeHtml = '';
  if (isCustomer) {
    noticeHtml = '<div style="background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:8px;padding:12px 14px;margin-bottom:1.25rem;font-size:12px;color:#166534;line-height:1.7">'
      + '<strong style="display:block;margin-bottom:4px">개인정보 수집 및 이용 안내</strong>'
      + '본 설문은 제품 및 서비스 개선을 위한 R&D 목적으로만 활용됩니다. 수집된 응답은 익명으로 처리되며, 제3자에게 제공되지 않습니다. 성명·연락처 등 개인 식별 정보는 수집하지 않습니다.'
      + '</div>';
  }
  if (isStaff) {
    noticeHtml = '<div style="background:#eff6ff;border:0.5px solid #bfdbfe;border-radius:8px;padding:12px 14px;margin-bottom:1.25rem;font-size:12px;color:#1e40af;line-height:1.7">'
      + '<strong style="display:block;margin-bottom:4px">조사 목적 안내</strong>'
      + '본 설문은 제품·배송·서비스 프로세스의 구조적 개선 방향을 파악하기 위한 R&D 조사입니다. 응답 내용은 개인 업무 평가 및 인사 자료로 활용되지 않으며, R&D 개선 목적 외에 사용되지 않습니다.'
      + '</div>';
  }

  var html = '<div class="form-wrap">';
  html += '<div class="form-head"><div class="form-title">' + s.title + '</div><div class="form-meta">' + s.meta + '</div></div>';
  html += '<div class="form-body">';
  html += noticeHtml;

  s.sections.forEach(function(sec) {
    html += '<div class="sec-divider">' + sec.label + '</div>';
    sec.fields.forEach(function(f) { html += renderField(f, key); });
  });
  html += '</div>';
  html += '<div class="submit-area"><button class="btn-submit" id="btn-' + key + '" onclick="submitForm(\'' + key + '\')">제출하기</button><div class="submit-msg" id="msg-' + key + '"></div></div>';
  html += '</div>';
  document.getElementById('form-container').innerHTML = html;
}

function renderField(f, key) {
  var h = '<div class="q-block"><div class="q-text">' + f.text + '</div>';
  if (f.type === 'likert') {
    h += '<div class="likert-wrap">';
    for (var i = 1; i <= f.max; i++) {
      h += '<button class="lk-btn" data-key="' + key + '" data-id="' + f.id + '" data-val="' + i + '" onclick="pickLikert(this)">' + i + '</button>';
    }
    h += '</div><div class="likert-ends"><span class="likert-end">전혀 아니다</span><span class="likert-end">매우 그렇다</span></div>';
  } else if (f.type === 'radio') {
    h += '<div class="opt-col">';
    f.opts.forEach(function(o) {
      h += '<label class="opt-item"><input type="radio" name="' + key + '_' + f.id + '" value="' + o + '" onchange="setVal(\'' + key + '\',\'' + f.id + '\',this.value)"> ' + o + '</label>';
    });
    h += '</div>';
  } else if (f.type === 'check') {
    h += '<div class="opt-grid">';
    f.opts.forEach(function(o) {
      h += '<label class="opt-item"><input type="checkbox" value="' + o + '" onchange="setCheck(\'' + key + '\',\'' + f.id + '\',this)"> ' + o + '</label>';
    });
    h += '</div>';
  } else if (f.type === 'text') {
    h += '<input type="text" oninput="setVal(\'' + key + '\',\'' + f.id + '\',this.value)">';
  } else if (f.type === 'textarea') {
    h += '<textarea oninput="setVal(\'' + key + '\',\'' + f.id + '\',this.value)" placeholder="자유롭게 기재해 주십시오"></textarea>';
  }
  h += '</div>';
  return h;
}

function pickLikert(btn) {
  var key = btn.dataset.key, id = btn.dataset.id, val = parseInt(btn.dataset.val);
  document.querySelectorAll('.lk-btn[data-key="' + key + '"][data-id="' + id + '"]').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
  setVal(key, id, val);
}

function setVal(key, id, val) {
  if (!formData[key]) formData[key] = {};
  formData[key][id] = val;
}

function setCheck(key, id, cb) {
  if (!formData[key]) formData[key] = {};
  if (!formData[key][id]) formData[key][id] = [];
  if (cb.checked) formData[key][id].push(cb.value);
  else formData[key][id] = formData[key][id].filter(function(v){ return v !== cb.value; });
}

function submitForm(key) {
  var btn = document.getElementById('btn-' + key);
  var msg = document.getElementById('msg-' + key);
  btn.disabled = true;
  btn.textContent = '저장 중...';
  msg.innerHTML = '';
  var payload = Object.assign({}, formData[key] || {}, { _survey: key, _ts: new Date().toISOString() });
  Object.keys(payload).forEach(function(k) {
    if (Array.isArray(payload[k])) payload[k] = payload[k].join(', ');
  });
  fetch(API, {
    method: 'POST',
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); }).then(function(res) {
    if (res.status === 'ok') {
      msg.innerHTML = '<span class="submit-ok">✓ 저장되었습니다. 응답해 주셔서 감사합니다.</span>';
      formData[key] = {};
      setTimeout(function(){ selectSurvey(key); }, 1800);
    } else {
      msg.innerHTML = '<span class="submit-err">오류가 발생했습니다. 다시 시도해 주세요.</span>';
      btn.disabled = false; btn.textContent = '제출하기';
    }
  }).catch(function() {
    msg.innerHTML = '<span class="submit-err">네트워크 오류입니다. 다시 시도해 주세요.</span>';
    btn.disabled = false; btn.textContent = '제출하기';
  });
}

var chartInstances = {};
function destroyChart(id) { if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; } }
function isDark() { return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
function tColor() { return isDark() ? '#d4d0ca' : '#6b6864'; }
function gColor() { return isDark() ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)'; }

function loadDashboard() {
  var keys = ['A','B','C','D','E','F'];
  var total = 0; var allScores = []; var loaded = 0;
  dashData = {};
  document.getElementById('total-count').innerHTML = '...<span class="metric-unit">건</span>';
  document.getElementById('avg-score').innerHTML = '...<span class="metric-unit">점</span>';
  keys.forEach(function(k) {
    fetch(API + '?survey=' + k)
      .then(function(r){ return r.json(); })
      .then(function(res) {
        dashData[k] = res.data || [];
        total += dashData[k].length;
        dashData[k].forEach(function(row) {
          Object.keys(row).forEach(function(field) {
            var v = parseFloat(row[field]);
            if (!isNaN(v) && v >= 1) allScores.push(v);
          });
        });
        loaded++;
        if (loaded === keys.length) {
          document.getElementById('total-count').innerHTML = total + '<span class="metric-unit">건</span>';
          var avg = allScores.length > 0 ? (allScores.reduce(function(a,b){return a+b;},0)/allScores.length) : 0;
          document.getElementById('avg-score').innerHTML = avg.toFixed(1) + '<span class="metric-unit">점</span>';
          renderDonut();
          renderDetail(currentFilter);
        }
      }).catch(function() {
        loaded++;
        if (loaded === keys.length) { renderDonut(); renderDetail(currentFilter); }
      });
  });
}

function renderDonut() {
  var keys = ['A','B','C','D','E','F'];
  var labels = ['A 라운지','B AS','C 배송','D 직원','E 서비스','F 배송엔지'];
  var colors = ['#1d4ed8','#3b82f6','#93c5fd','#15803d','#4ade80','#86efac'];
  var data = keys.map(function(k){ return (dashData[k]||[]).length; });
  destroyChart('donutChart');
  var el = document.getElementById('donutChart');
  if (!el) return;
  chartInstances['donutChart'] = new Chart(el.getContext('2d'), {
    type: 'doughnut',
    data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false } } }
  });
  var legend = document.getElementById('donut-legend');
  if (legend) legend.innerHTML = labels.map(function(l,i){ return '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+tColor()+'"><span style="width:10px;height:10px;border-radius:2px;background:'+colors[i]+';flex-shrink:0"></span>'+l+' '+data[i]+'</span>'; }).join('');
}

function filterDash(key, btn) {
  currentFilter = key;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderDetail(key);
}

function renderDetail(key) {
  var dd = document.getElementById('dash-detail');
  var rows = dashData[key] || [];
  var s = SURVEYS[key];
  if (rows.length === 0) { dd.innerHTML = '<div class="empty">아직 <strong>' + s.title + '</strong>의 응답이 없습니다.</div>'; return; }

  var likertFields = [];
  s.sections.forEach(function(sec){ sec.fields.forEach(function(f){ if (f.type==='likert') likertFields.push(f); }); });
  var maxScale = s.maxScale;

  var hwIds = ['T1','T2','T3','T4','R1','R2','R3','RS1','RS2','A1','A2','A3','FIT1','FIT2','FIT3','FIT4'];
  var appIds = ['UX1','UX2','UX3','UX4','UX5','ND1','ND2','ND3','ND4','ND5','ND6','ND7'];
  var hwF = likertFields.filter(function(f){ return hwIds.indexOf(f.id)!==-1; });
  var appF = likertFields.filter(function(f){ return appIds.indexOf(f.id)!==-1; });
  var hasTwo = hwF.length>0 && appF.length>0;

  function avg(f) {
    var vals = rows.map(function(r){ return parseFloat(r[f.id]); }).filter(function(v){ return !isNaN(v)&&v>=1; });
    return vals.length>0 ? parseFloat((vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(2)) : 0;
  }

  var html = '';

  if (hasTwo) {
    html += '<div class="dash-card"><div class="dash-card-title">'+s.title+' — 하드웨어 vs 앱·UX ('+rows.length+'건 · /'+maxScale+'점)</div>';
    html += '<div style="display:flex;gap:14px;margin-bottom:10px">';
    html += '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+tColor()+'"><span style="width:10px;height:10px;border-radius:50%;background:#1d4ed8"></span>하드웨어</span>';
    html += '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+tColor()+'"><span style="width:10px;height:10px;border-radius:50%;background:#15803d"></span>앱·UX</span>';
    html += '</div><div style="position:relative;width:100%;height:270px"><canvas id="radarChart" role="img" aria-label="레이더 차트">레이더</canvas></div></div>';
  } else {
    html += '<div class="dash-card"><div class="dash-card-title">'+s.title+' — 항목별 평균 ('+rows.length+'건)</div>';
    var h = Math.max(200, likertFields.length*34+60);
    html += '<div style="position:relative;width:100%;height:'+h+'px"><canvas id="hbarChart" role="img" aria-label="가로 막대 차트">가로 막대</canvas></div></div>';
  }

  var hasAge = false;
  s.sections.forEach(function(sec){ sec.fields.forEach(function(f){ if(f.id==='age') hasAge=true; }); });
  if (hasAge) {
    var ageOpts = ['만 20~29세','만 30~39세','만 40~49세','만 50~59세','만 60세 이상'];
    html += '<div class="dash-card"><div class="dash-card-title">연령대 분포 (만 나이 기준)</div>';
    html += '<div style="position:relative;width:100%;height:150px"><canvas id="ageChart" role="img" aria-label="연령대 분포">연령대</canvas></div></div>';
  }

  var hasBarrier = false;
  s.sections.forEach(function(sec){ sec.fields.forEach(function(f){ if(f.id==='barrier') hasBarrier=true; }); });
  if (hasBarrier) {
    var bOpts = ['가격·비용','공간 문제','효과 불확실','경쟁사 대비 차별성','AS 우려','해당 없음'];
    var bColors = ['#1a1918','#57534e','#a8a29e','#d6d3d1','#e7e5e4','#c8c4bc'];
    html += '<div class="dash-card"><div class="dash-card-title">구매·렌탈 장애 요인</div>';
    html += '<div style="position:relative;width:100%;height:160px"><canvas id="barrierChart" role="img" aria-label="파이 차트">파이</canvas></div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">';
    bOpts.forEach(function(o,i){ html += '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+tColor()+'"><span style="width:10px;height:10px;border-radius:2px;background:'+bColors[i]+'"></span>'+o+'</span>'; });
    html += '</div></div>';
  }

  var checkFields = [];
  s.sections.forEach(function(sec){ sec.fields.forEach(function(f){ if(f.type==='check') checkFields.push(f); }); });
  checkFields.forEach(function(f){
    var counts = {};
    rows.forEach(function(r){ if(r[f.id]) r[f.id].split(', ').forEach(function(v){ if(v) counts[v]=(counts[v]||0)+1; }); });
    var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
    if (!sorted.length) return;
    html += '<div class="dash-card"><div class="dash-card-title">개선 우선순위 (복수 선택)</div>';
    sorted.slice(0,8).forEach(function(v){
      var pct = Math.round((counts[v]/rows.length)*100);
      html += '<div class="bar-row"><div class="bar-label">'+v.slice(0,14)+(v.length>14?'…':'')+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><div class="bar-val">'+counts[v]+'건</div></div>';
    });
    html += '</div>';
  });

  var comments = rows.map(function(r){ return r['comment']||r['OPP1']||''; }).filter(function(v){ return v&&v.trim(); });
  if (comments.length>0) {
    html += '<div class="dash-card"><div class="dash-card-title">주관식 응답 ('+comments.length+'건)</div>';
    comments.slice(0,5).forEach(function(c){
      html += '<div style="font-size:13px;padding:8px 0;border-bottom:0.5px solid var(--border);line-height:1.6;color:var(--text-sub)">"'+c+'"</div>';
    });
    html += '</div>';
  }

  dd.innerHTML = html;

  setTimeout(function() {
    if (hasTwo) {
      var allF = hwF.concat(appF);
      var allLabels = allF.map(function(f){ return f.text.length>9?f.text.slice(0,9)+'…':f.text; });
      var hwAvg = hwF.map(avg); var appAvg = appF.map(avg);
      var hwPad = new Array(appF.length).fill(null);
      var appPad = new Array(hwF.length).fill(null);
      destroyChart('radarChart');
      var rc = document.getElementById('radarChart');
      if (rc) chartInstances['radarChart'] = new Chart(rc.getContext('2d'), {
        type:'radar',
        data:{ labels:allLabels, datasets:[
          { label:'하드웨어', data:hwAvg.concat(hwPad), borderColor:'#1d4ed8', backgroundColor:'rgba(29,78,216,0.12)', borderWidth:2, pointBackgroundColor:'#1d4ed8', pointRadius:3, borderDash:[] },
          { label:'앱·UX', data:appPad.concat(appAvg), borderColor:'#15803d', backgroundColor:'rgba(21,128,61,0.10)', borderWidth:2, pointBackgroundColor:'#15803d', pointRadius:3, borderDash:[4,3] }
        ]},
        options:{ responsive:true, maintainAspectRatio:false,
          scales:{ r:{ min:0, max:maxScale, ticks:{stepSize:1,color:tColor(),font:{size:10},backdropColor:'transparent'}, grid:{color:gColor()}, pointLabels:{color:tColor(),font:{size:10}}, angleLines:{color:gColor()} } },
          plugins:{legend:{display:false}}
        }
      });
    } else {
      var hbarLabels = likertFields.map(function(f){ return f.text.length>16?f.text.slice(0,16)+'…':f.text; });
      var hbarData = likertFields.map(avg);
      destroyChart('hbarChart');
      var hc = document.getElementById('hbarChart');
      if (hc) chartInstances['hbarChart'] = new Chart(hc.getContext('2d'), {
        type:'bar',
        data:{ labels:hbarLabels, datasets:[{ data:hbarData, backgroundColor:'#1d4ed8', borderWidth:0, borderRadius:4 }] },
        options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
          scales:{ x:{min:0,max:maxScale,ticks:{color:tColor(),font:{size:10}},grid:{color:gColor()}}, y:{ticks:{color:tColor(),font:{size:10}},grid:{display:false}} },
          plugins:{legend:{display:false}}
        }
      });
    }

    if (hasAge) {
      var ageOpts2 = ['만 20~29세','만 30~39세','만 40~49세','만 50~59세','만 60세 이상'];
      var ageData = ageOpts2.map(function(o){ var c=0; rows.forEach(function(r){ if(r['age']===o) c++; }); return c; });
      destroyChart('ageChart');
      var ac = document.getElementById('ageChart');
      if (ac) chartInstances['ageChart'] = new Chart(ac.getContext('2d'), {
        type:'bar',
        data:{ labels:ageOpts2, datasets:[{ data:ageData, backgroundColor:'#1d4ed8', borderWidth:0, borderRadius:4 }] },
        options:{ responsive:true, maintainAspectRatio:false,
          scales:{ x:{ticks:{color:tColor(),font:{size:10},autoSkip:false},grid:{display:false}}, y:{ticks:{color:tColor(),font:{size:10},stepSize:1},grid:{color:gColor()},beginAtZero:true} },
          plugins:{legend:{display:false}}
        }
      });
    }

    if (hasBarrier) {
      var bOpts2 = ['가격·비용','공간 문제','효과 불확실','경쟁사 대비 차별성','AS 우려','해당 없음'];
      var bColorsArr = ['#1a1918','#57534e','#a8a29e','#d6d3d1','#e7e5e4','#c8c4bc'];
      var bData = bOpts2.map(function(o){ var c=0; rows.forEach(function(r){ if(r['barrier']===o) c++; }); return c; });
      destroyChart('barrierChart');
      var bc = document.getElementById('barrierChart');
      if (bc) chartInstances['barrierChart'] = new Chart(bc.getContext('2d'), {
        type:'pie',
        data:{ labels:bOpts2, datasets:[{ data:bData, backgroundColor:bColorsArr, borderWidth:0 }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
      });
    }
  }, 50);
}

selectSurvey('A');
</script>
